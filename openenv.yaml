name: soc-triage-gym
version: "0.1.0"
description: >
  A reinforcement learning environment simulating a Security Operations Center (SOC) analyst.
  An AI agent receives SIEM alerts and must enrich threat indicators, query log sources,
  correlate events across alerts, classify alerts as TP/FP/BTP, map findings to MITRE ATT&CK,
  and recommend containment actions. Team-mode episodes add Tier-1, Tier-2, and SOC Manager
  roles with inter-agent tickets. Programmatic graders provide verifiable rewards (RLVR);
  the adaptive Red-Team Generator makes the task source itself dynamic (RLVE), keeping the
  blue-team near the learning frontier.

author: rohitcraftsyt

tags:
  - openenv
  - cybersecurity
  - soc
  - siem
  - mitre-attack
  - reinforcement-learning
  - multi-agent
  - oversight
  - self-improvement

observation_space:
  type: dict
  description: >
    SOCObservation containing alert_queue (list of alerts with IOCs), investigations
    (per-alert investigation state), enrichment_results, log_results, correlated_events,
    asset_info, user_info, investigation_budget, step, done, reward, cumulative_reward, message.

action_space:
  type: dict
  description: >
    SOCAction with action_type field: enrich_indicator, query_logs, correlate_alerts,
    check_asset, check_user, classify_alert, map_technique, recommend_action,
    escalate, submit_investigation, noop, escalate_to_tier2, phase_complete,
    forensic_timeline, sandbox_detonate, memory_analysis, isolate_host, disable_user,
    block_ioc, close_case, review_decision, override_classification, flag_inconsistency,
    explain_team_behavior. Team mode also accepts a role field in the step body.

tasks:
  - id: phishing
    name: "Single-Alert Phishing Triage"
    description: >
      Triage a single phishing email alert. Enrich IOCs, query logs,
      classify as TP or FP, map MITRE ATT&CK technique, recommend response.
    difficulty: easy
    max_steps: 15
    reward_range: [0.0, 1.0]

  - id: lateral_movement
    name: "Multi-Alert Lateral Movement Kill Chain"
    description: >
      Investigate 5 correlated alerts forming a kill chain: phishing,
      credential dump, lateral movement, data staging, exfiltration.
      Correlate all alerts, map techniques, classify all as true positives.
    difficulty: medium
    max_steps: 30
    reward_range: [0.0, 1.0]

  - id: queue_management
    name: "Alert Queue Management Under Noise"
    description: >
      Triage 20 mixed alerts: 5 true positives in 2 attack chains,
      3 benign true positives, 12 false positives. Dismiss noise
      efficiently while surfacing real attacks.
    difficulty: hard
    max_steps: 60
    reward_range: [0.0, 1.0]

  - id: insider_threat
    name: "Insider Threat Investigation"
    description: >
      Investigate 30 alerts hiding 3 insider threat attack chains:
      unauthorized data theft, compromised vendor account, and a
      disgruntled employee. 9 true positives, 5 benign true positives,
      16 false positives. Expert-level SOC triage under heavy noise.
    difficulty: expert
    max_steps: 80
    reward_range: [0.0, 1.0]

  - id: apt_campaign
    name: "APT Campaign (Super Long-Horizon)"
    description: >
      250-step composite APT campaign with 60+ alerts across 5 phases
      (initial access → persistence → lateral → exfil → cleanup).
      Sparse delayed narrative reward, policy drift, rotating expert judge.
    difficulty: super-hard
    max_steps: 250
    reward_range: [0.0, 1.0]

  - id: team_phishing_escalation
    name: "Team Phishing Escalation"
    description: >
      Tier-1 triages a phishing alert, escalates it to Tier-2 for containment,
      and the SOC Manager reviews the team decision trail.
    difficulty: easy
    max_steps: 68
    reward_range: [0.0, 1.0]

  - id: team_lateral_team
    name: "Team Lateral Movement"
    description: >
      Tier-1 triages a noisy lateral movement queue, Tier-2 responds to escalations,
      and the SOC Manager flags missed threats and inconsistencies.
    difficulty: medium
    max_steps: 68
    reward_range: [0.0, 1.0]

  - id: red_team_generated
    name: "Generated Adversarial Scenario"
    description: >
      Execute the most recently generated curriculum scenario returned by POST /generate_scenario.
    difficulty: adaptive
    max_steps: 30
    reward_range: [0.0, 1.0]

reward:
  range: [0.0, 1.0]
  dense: true
  description: >
    Dense step rewards for enrichment, log queries, correlations, classifications.
    Final reward on submit: grader score (0.0-1.0) x efficiency multiplier.

endpoints:
  health:   GET  /health
  metadata: GET  /metadata
  schema:   GET  /schema
  reset:    POST /reset
  step:     POST /step
  state:    GET  /state
  tasks:    GET  /tasks
  grader:   POST /grader
  baseline: POST /baseline
  generate_scenario: POST /generate_scenario
  inbox:              GET  /inbox/{role}
  actors_messages:    GET  /actors/messages
  policy_current:     GET  /policy/current
  policy_history:     GET  /policy/history
  reward_config:      GET  /reward/config
  reward_token_bonus: POST /reward/token_bonus
  experts_current:    GET  /experts/current
  experts_rotate:     POST /experts/rotate
  experts_panel:      GET  /experts/panel
  tickets_list:       GET  /tickets
  tickets_open:       POST /tickets/open
  tickets_resolve:    POST /tickets/{id}/resolve
  tickets_can_disable_user: GET /tickets/can_disable_user
  themes_coverage:    GET  /themes/coverage
  mcp:                POST /mcp
